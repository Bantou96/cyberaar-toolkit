---
name: Galaxy Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — build tarball but do not publish"
        required: false
        default: "false"

jobs:
  publish:
    name: galaxy-publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ansible-core
        run: pip install ansible-core==2.20.2

      - name: Read collection metadata
        id: meta
        working-directory: ansible-hardening
        run: |
          NAMESPACE=$(grep '^namespace:' galaxy.yml | awk '{print $2}')
          NAME=$(grep '^name:' galaxy.yml | awk '{print $2}')
          VERSION=$(grep '^version:' galaxy.yml | awk '{print $2}')
          echo "namespace=$NAMESPACE" >> "$GITHUB_OUTPUT"
          echo "name=$NAME"          >> "$GITHUB_OUTPUT"
          echo "version=$VERSION"    >> "$GITHUB_OUTPUT"
          echo "tarball=${NAMESPACE}-${NAME}-${VERSION}.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Build collection
        working-directory: ansible-hardening
        run: ansible-galaxy collection build --force

      - name: Publish to Galaxy
        if: ${{ github.event.inputs.dry_run != 'true' }}
        working-directory: ansible-hardening
        run: |
          ansible-galaxy collection publish \
            "${{ steps.meta.outputs.tarball }}" \
            --api-key "${{ secrets.GALAXY_API_KEY }}"

      - name: Dry run summary
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: |
          echo "Dry run — tarball built but not published:"
          echo "  ${{ steps.meta.outputs.namespace }}.${{ steps.meta.outputs.name }} v${{ steps.meta.outputs.version }}"

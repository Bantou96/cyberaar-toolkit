---
- name: "Prepare — fail2ban Ubuntu"
  hosts: all
  gather_facts: true
  become: true

  tasks:
    - name: "Update apt cache"
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: "Install openssh-server (required for sshd jail)"
      ansible.builtin.apt:
        name: openssh-server
        state: present

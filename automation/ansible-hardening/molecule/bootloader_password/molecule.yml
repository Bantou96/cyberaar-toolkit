---
dependency:
  name: galaxy

driver:
  name: docker

platforms:
  - name: rhel9
    image: geerlingguy/docker-rockylinux9-ansible:latest
    pre_build_image: true
    privileged: true
    cgroupns_mode: host
    command: /usr/lib/systemd/systemd
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw

  - name: ubuntu
    image: geerlingguy/docker-ubuntu2204-ansible:latest
    pre_build_image: true
    privileged: true
    cgroupns_mode: host
    command: /lib/systemd/systemd
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw

provisioner:
  name: ansible
  env:
    ANSIBLE_ROLES_PATH: "${MOLECULE_PROJECT_DIRECTORY}/roles"
    # Test password — safe to expose in molecule, never used in production
    LINUX_BOOTLOADER_PASSWORD: "CyberAarMoleculeTest2026!"
  inventory:
    host_vars:
      rhel9:
        ansible_become: false
        ansible_user: root

verifier:
  name: ansible

scenario:
  # Skip idempotency: PBKDF2 uses a random salt each run, so the generated
  # hash and template differ between runs by design. This is not a bug.
  test_sequence:
    - destroy
    - create
    - prepare
    - converge
    - verify
    - destroy

---
- name: "Prepare — secure_boot RHEL9"
  hosts: rhel9
  gather_facts: false
  become: false

  tasks:
    - name: "Update dnf cache"
      ansible.builtin.raw: dnf makecache -q
      changed_when: false

- name: "Prepare — secure_boot Ubuntu"
  hosts: ubuntu
  gather_facts: false
  become: true

  tasks:
    - name: "Update apt cache"
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: "Ensure /etc/default/grub.d exists (absent in minimal Ubuntu containers)"
      ansible.builtin.file:
        path: /etc/default/grub.d
        state: directory
        mode: "0755"
        owner: root
        group: root

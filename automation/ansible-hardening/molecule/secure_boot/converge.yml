---
- name: "Converge — secure_boot RHEL9"
  hosts: rhel9
  become: false
  vars:
    # Containers do not have Secure Boot — disable enforce to prevent role failure
    linux_secure_boot_enforce: false
  roles:
    - role: linux_secure_boot_rhel9

- name: "Converge — secure_boot Ubuntu"
  hosts: ubuntu
  become: true
  vars:
    # Containers do not have Secure Boot — suppress warning only
    linux_secure_boot_warn_if_disabled: false
  roles:
    - role: linux_secure_boot_ubuntu

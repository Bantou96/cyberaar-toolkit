---
- name: "Prepare — SELinux RHEL9"
  hosts: all
  gather_facts: true
  become: true

  tasks:
    - name: "Update dnf cache"
      ansible.builtin.dnf:
        update_cache: true

    - name: "Install SELinux policy tools"
      ansible.builtin.dnf:
        name:
          - selinux-policy
          - selinux-policy-targeted
          - python3-libselinux
          - python3-libsemanage
        state: present

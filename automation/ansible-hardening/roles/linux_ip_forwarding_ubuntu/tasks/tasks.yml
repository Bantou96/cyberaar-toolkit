---

- name: "Disable IP forwarding (IPv4)"
  ansible.posix.sysctl:
    name: "net.ipv4.ip_forward"
    value: "{{ '1' if linux_ip_forwarding_enable_ipv4 | bool else '0' }}"
    state: "present"
    sysctl_set: true
    sysctl_file: "{{ linux_ip_forwarding_sysctl_file }}"
    reload: true
  register: "ipv4_forward_result"

- name: "Disable IP forwarding (IPv6)"
  ansible.posix.sysctl:
    name: "net.ipv6.conf.all.forwarding"
    value: "{{ '1' if linux_ip_forwarding_enable_ipv6 | bool else '0' }}"
    state: "present"
    sysctl_set: true
    sysctl_file: "{{ linux_ip_forwarding_sysctl_file }}"
    reload: true
  register: "ipv6_forward_result"

- name: "Disable accept redirects (IPv4)"
  ansible.posix.sysctl:
    name: "net.ipv4.conf.all.accept_redirects"
    value: "0"
    state: "present"
    sysctl_set: true
    sysctl_file: "{{ linux_ip_forwarding_sysctl_file }}"
    reload: true
  register: "ipv4_redirects_result"

- name: "Disable accept redirects (IPv6)"
  ansible.posix.sysctl:
    name: "net.ipv6.conf.all.accept_redirects"
    value: "0"
    state: "present"
    sysctl_set: true
    sysctl_file: "{{ linux_ip_forwarding_sysctl_file }}"
    reload: true
  register: "ipv6_redirects_result"

- name: "Debug IP forwarding status (verbosity >=1)"
  when: "ansible_verbosity >= 1"
  ansible.builtin.debug:
    msg:
      - "net.ipv4.ip_forward: {{ '1' if linux_ip_forwarding_enable_ipv4 | bool else '0' }}"
      - "net.ipv6.conf.all.forwarding: {{ '1' if linux_ip_forwarding_enable_ipv6 | bool else '0' }}"
      - "accept_redirects (IPv4/IPv6): 0"
      - "IPv4 forward changed: {{ ipv4_forward_result.changed | default(false) }}"
      - "IPv6 forward changed: {{ ipv6_forward_result.changed | default(false) }}"

...

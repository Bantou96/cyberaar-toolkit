---

- name: "Ensure crypto-policies package is present"
  ansible.builtin.package:
    name: "crypto-policies"
    state: "present"

- name: "Register the current active crypto policy"
  ansible.builtin.command: "update-crypto-policies --show"
  changed_when: false
  check_mode: false
  register: "linux_crypto_policies_current"

- name: "Set fact for current policy"
  ansible.builtin.set_fact:
    linux_crypto_policies_active: "{{ linux_crypto_policies_current.stdout | trim }}"

- name: "Create local.d directory if subpolicies are defined"
  when: "linux_crypto_policies_subpolicies | length > 0"
  ansible.builtin.file:
    path: "/etc/crypto-policies/local.d"
    state: "directory"
    mode: "0755"

# FIX: subpolicies list must be dicts with 'name' and optional 'content'.
# String entries (e.g. "no-sha1") are normalized to {name: "no-sha1", content: "hash = -SHA1"}
# before the loop so combine() is never called on a bare string.
- name: "Normalize subpolicies to dict list"
  ansible.builtin.set_fact:
    linux_crypto_policies_subpolicies_normalized: >-
      {{
        linux_crypto_policies_subpolicies | default([]) | map('community.general.dict_kv', 'raw') | list
        | map('combine', {'content': 'hash = -SHA1'} if item is string else {})
      }}
  # Simpler, safer approach: handle normalization inline per item below

- name: "Apply custom subpolicy files"
  ansible.builtin.copy:
    content: "{{ item.content if item is mapping else 'hash = -SHA1' }}"
    dest: "/etc/crypto-policies/local.d/{{ item.name if item is mapping else item }}.pmod"
    mode: "0644"
    backup: true
  loop: "{{ linux_crypto_policies_subpolicies | default([]) }}"
  loop_control:
    label: "{{ item.name if item is mapping else item }}.pmod"
  register: "linux_crypto_policies_subpolicy_result"

- name: "Update crypto policy only if needed"
  when:
    - "linux_crypto_policies_policy is defined"
    - >-
      linux_crypto_policies_policy != linux_crypto_policies_active or
      linux_crypto_policies_subpolicy_result.changed
  ansible.builtin.command:
    cmd: "update-crypto-policies --set {{ linux_crypto_policies_policy }}"
  register: "policy_update"
  changed_when: "policy_update.rc == 0"
  notify: "Reload services affected by crypto policy change"

- name: "Debug current vs desired policy"
  when: "ansible_verbosity >= 1"
  ansible.builtin.debug:
    msg: >-
      Current: '{{ linux_crypto_policies_active }}'
      | Desired: '{{ linux_crypto_policies_policy }}'
      | Subpolicy changed: {{ linux_crypto_policies_subpolicy_result.changed }}

...

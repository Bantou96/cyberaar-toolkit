---

# Enable tmp mounts hardening (CIS 1.1.2–1.1.5)
linux_tmp_mounts_enabled: true

# Mount options (CIS recommended)
linux_tmp_mount_options:
  - "noexec"
  - "nodev"
  - "nosuid"

# Paths to harden (standard temp dirs)
linux_tmp_mount_paths:
  - "/tmp"
  - "/var/tmp"
  - "/dev/shm"

# CIS 1.1.14 — Ensure nodev option set on /home partition
# (only nodev — noexec/nosuid would break user scripts)
linux_home_nodev_enabled: true

# CIS 1.1.21 — Ensure sticky bit is set on all world-writable directories
linux_sticky_bit_enabled: true

# Role disable var
linux_tmp_mounts_disabled: false

...

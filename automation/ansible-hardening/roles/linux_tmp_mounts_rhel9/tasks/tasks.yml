---

- name: "Gather current mount facts"
  ansible.builtin.setup:
    filter: "ansible_mounts"

- name: "Ensure tmp mounts have required options"
  ansible.posix.mount:
    path: "{{ item }}"
    src: "tmpfs"
    fstype: "tmpfs"
    opts: "{{ linux_tmp_mount_options | join(',') }}"
    state: "mounted"
    permanent: true
  loop: "{{ linux_tmp_mount_paths }}"
  register: "tmp_mount_result"
  notify: "Remount tmp filesystems if changed"

- name: "Remount tmp filesystems if options were updated"
  when: "tmp_mount_result.results | selectattr('changed', 'equalto', true) | list | length > 0"
  ansible.builtin.command: "mount -o remount {{ item }}"
  loop: "{{ linux_tmp_mount_paths }}"
  changed_when: false   # mount options already persisted by ansible.posix.mount above

- name: "Verify mount options (debug verbosity >=1)"
  when: "ansible_verbosity >= 1"
  ansible.builtin.command: "findmnt -o OPTIONS {{ item }}"
  register: "mount_check"
  changed_when: false
  loop: "{{ linux_tmp_mount_paths }}"

- name: "Debug tmp mounts status"
  when: "ansible_verbosity >= 1"
  ansible.builtin.debug:
    msg: "{{ mount_check.results | map(attribute='stdout') | list }}"

...

---

# Lock interactive login for system/service accounts
linux_user_management_lock_system_accounts: true

# System accounts to lock (no interactive login needed)
linux_user_management_system_accounts:
  - "daemon"
  - "bin"
  - "sys"
  - "sync"
  - "games"
  - "man"
  - "lp"
  - "mail"
  - "news"
  - "uucp"
  - "proxy"
  - "www-data"
  - "backup"
  - "list"
  - "irc"
  - "gnats"
  - "nobody"
  - "messagebus"

# Root shell
linux_user_management_root_shell: "/bin/bash"

# Default umask (027 = group read, no other access)
linux_user_management_umask: "027"

# Days before inactive accounts are locked (CIS 5.5.1.4)
linux_user_management_inactive_days: 30

# Role disable var
linux_user_management_disabled: false

...

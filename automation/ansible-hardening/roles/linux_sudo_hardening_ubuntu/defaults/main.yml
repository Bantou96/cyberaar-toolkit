---

# CIS 1.3.1 — Ensure sudo is installed
linux_sudo_install: true

# CIS 1.3.2 — Ensure sudo commands use pty
linux_sudo_use_pty: true

# CIS 1.3.3 — Ensure sudo log file exists
linux_sudo_logfile_enabled: true
linux_sudo_logfile: "/var/log/sudo.log"

# Role disable var
linux_sudo_hardening_disabled: false

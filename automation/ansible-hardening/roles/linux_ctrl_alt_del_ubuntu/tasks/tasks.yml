---

- name: "Mask ctrl-alt-del.target to prevent accidental reboot (CIS 1.6.1)"
  ansible.builtin.systemd:
    name: "ctrl-alt-del.target"
    masked: true
    state: "stopped"
  failed_when: false
  register: "mask_result"

- name: "Reload systemd daemon to apply mask"
  ansible.builtin.systemd:
    daemon_reload: true
  when: "mask_result.changed"

- name: "Verify ctrl-alt-del.target is masked"
  ansible.builtin.command: "systemctl status ctrl-alt-del.target"
  changed_when: false
  register: "cad_status"
  failed_when: false

- name: "Debug ctrl-alt-del status (verbosity >=1)"
  when: "ansible_verbosity >= 1"
  ansible.builtin.debug:
    msg: "ctrl-alt-del.target status: {{ cad_status.stdout | default('unknown') }}"

...

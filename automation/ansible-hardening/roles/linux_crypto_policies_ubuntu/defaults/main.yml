---

# Minimum TLS version to allow (1.2 or 1.3)
linux_crypto_min_tls_version: "TLSv1.2"

# Allowed TLS cipher suites (TLS 1.2)
linux_crypto_tls12_ciphers: "ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256"

# Allowed TLS 1.3 ciphersuites
linux_crypto_tls13_ciphers: "TLS_AES_256_GCM_SHA384:TLS_AES_128_GCM_SHA256:TLS_CHACHA20_POLY1305_SHA256"

# Minimum DH parameter size (bits)
linux_crypto_dh_min_bits: 2048

# Configure GnuTLS as well (for apps using GnuTLS library)
linux_crypto_configure_gnutls: true

# Disable SSLv2/SSLv3/TLSv1.0/TLSv1.1
linux_crypto_disable_legacy_tls: true

# Role disable var
linux_crypto_disabled: false

...

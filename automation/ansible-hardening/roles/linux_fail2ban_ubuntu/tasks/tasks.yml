---

- name: "Ensure fail2ban is installed"
  ansible.builtin.package:
    name: "fail2ban"
    state: "present"

- name: "Deploy fail2ban jail.local configuration"
  ansible.builtin.template:
    src: "jail.local.j2"
    dest: "/etc/fail2ban/jail.local"
    mode: "0644"
    owner: "root"
    group: "root"
    backup: true
  register: "fail2ban_jail_result"
  notify: "Restart fail2ban"

- name: "Enable and start fail2ban service"
  ansible.builtin.service:
    name: "fail2ban"
    state: "started"
    enabled: true

- name: "Verify fail2ban SSH jail is active"
  ansible.builtin.command: "fail2ban-client status sshd"
  changed_when: false
  register: "fail2ban_status"
  failed_when: false

- name: "Debug fail2ban status (verbosity >=1)"
  when: "ansible_verbosity >= 1"
  ansible.builtin.debug:
    msg:
      - "jail.local updated: {{ fail2ban_jail_result.changed | default(false) }}"
      - "fail2ban sshd jail: {{ fail2ban_status.stdout | default('not available') }}"

...

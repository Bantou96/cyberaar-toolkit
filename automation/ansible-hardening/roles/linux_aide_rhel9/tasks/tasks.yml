---

- name: "Install AIDE package"
  ansible.builtin.package:
    name: "aide"
    state: "present"

- name: "Initialize AIDE database if it does not exist yet"
  ansible.builtin.command: "aide --init"
  args:
    creates: "/var/lib/aide/aide.db.gz"           # idempotent: skip if final db already exists
  register: "aide_init"
  changed_when: "aide_init.rc == 0"

- name: "Activate the newly initialized AIDE database"
  when: "aide_init.changed"                         # only if init actually ran
  ansible.builtin.command: "mv /var/lib/aide/aide.db.new.gz /var/lib/aide/aide.db.gz"
  args:
    removes: "/var/lib/aide/aide.db.new.gz"       # idempotent: skip if .new.gz no longer exists
  changed_when: true

- name: "Configure AIDE monitoring rules in /etc/aide.conf"
  ansible.builtin.lineinfile:
    path: "/etc/aide.conf"
    regexp: "^{{ item | regex_escape() }} ="
    line: "{{ item }} = p+i+n+u+g+s+acl+selinux+xattrs+sha512"
    insertafter: "^#.*BEGIN AIDE CONFIG"
    create: true
  loop: "{{ linux_aide_monitored_paths }}"
  register: "aide_config_changed"
  changed_when: "aide_config_changed.changed"

- name: "Re-run AIDE init if monitoring rules were changed"
  when: "aide_config_changed.changed"
  ansible.builtin.command: "aide --init"
  args:
    creates: "/var/lib/aide/aide.db.new.gz"
  register: "aide_reinit"
  changed_when: "aide_reinit.rc == 0"

- name: "Activate updated AIDE database after config change"
  when: "aide_reinit.changed"
  ansible.builtin.command: "mv /var/lib/aide/aide.db.new.gz /var/lib/aide/aide.db.gz"
  args:
    removes: "/var/lib/aide/aide.db.new.gz"
  changed_when: true

- name: "Set up cron job for daily AIDE checks"
  ansible.builtin.cron:
    name: "Daily AIDE integrity check"
    minute: "{{ linux_aide_cron_time.split(' ')[0] }}"
    hour:   "{{ linux_aide_cron_time.split(' ')[1] }}"
    day:    "{{ linux_aide_cron_time.split(' ')[2] }}"
    month:  "{{ linux_aide_cron_time.split(' ')[3] }}"
    weekday: "{{ linux_aide_cron_time.split(' ')[4] }}"
    job:    "/usr/sbin/aide --check | /usr/bin/mail -s \"AIDE Integrity Report on {{ ansible_hostname }}\" root@localhost"
    state:  "present"

- name: "Debug AIDE status (verbosity >=1)"
  when: "ansible_verbosity >= 1"
  ansible.builtin.debug:
    msg:
      - "AIDE database initialized: {{ aide_init.changed | default(false) }}"
      - "Config changed: {{ aide_config_changed.changed | default(false) }}"
      - "Re-init triggered: {{ aide_reinit.changed | default(false) }}"

...

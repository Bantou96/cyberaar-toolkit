---

- name: "Stop and disable unnecessary services"
  when:
    - "item.condition | default(true) | bool"
    - "not ansible_check_mode"
  ansible.builtin.service:
    name: "{{ item.name }}"
    state: "stopped"
    enabled: false
  loop: "{{ linux_disable_services_list }}"
  failed_when: false
  register: "services_disabled"

- name: "Remove unnecessary packages if configured"
  when: "linux_disable_services_remove_packages | bool"
  ansible.builtin.package:
    name: "{{ linux_disable_services_packages_to_remove }}"
    state: "absent"
    purge: true
  register: "packages_removed"

- name: "Mask high-risk services via systemd (prevent re-enable)"
  when:
    - "linux_disable_services_mask | bool"
    - "not ansible_check_mode"
  ansible.builtin.command: "systemctl mask {{ item }}"
  loop: "{{ linux_disable_services_masked }}"
  failed_when: false
  changed_when: true
  register: "services_masked"

- name: "Debug disabled services (verbosity >=1)"
  when: "ansible_verbosity >= 1"
  ansible.builtin.debug:
    msg:
      - "Services stopped/disabled: {{ services_disabled.results | selectattr('changed') | map(attribute='item.name') | list }}"
      - "Services masked: {{ linux_disable_services_masked if linux_disable_services_mask else [] }}"

...

---

# Enable IP forwarding hardening (CIS 3.3.1–3.3.2)
linux_ip_forwarding_enabled: true

# Disable IP forwarding (net.ipv4.ip_forward = 0)
linux_ip_forwarding: "0"

# Disable IPv6 forwarding (net.ipv6.conf.all.forwarding = 0)
linux_ipv6_forwarding: "0"

# Disable accept_redirects (both IPv4/IPv6)
linux_accept_redirects: "0"

# Role disable var
linux_ip_forwarding_disabled: false

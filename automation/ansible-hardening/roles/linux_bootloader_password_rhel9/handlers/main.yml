---

- name: "Rebuild GRUB config"
  ansible.builtin.command: "grub2-mkconfig -o /boot/grub2/grub.cfg"
  changed_when: true

- name: "GRUB config updated - reboot recommended"
  ansible.builtin.debug:
    msg: >
      GRUB configuration updated with password protection.
      Changes are effective on next boot.
      **Reboot recommended** to verify password prompt in GRUB menu.

...

---

- name: "Set permissions on critical authentication files"
  ansible.builtin.file:
    path: "{{ item.path }}"
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop: "{{ linux_file_permissions_auth_files }}"
  failed_when: false
  register: "auth_files_result"

- name: "Set permissions on critical system files"
  ansible.builtin.file:
    path: "{{ item.path }}"
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop: "{{ linux_file_permissions_system_files }}"
  failed_when: false
  register: "system_files_result"

- name: "Ensure GRUB config has strict permissions (Ubuntu path)"
  ansible.builtin.file:
    path: "/boot/grub/grub.cfg"
    mode: "0600"
    owner: "root"
    group: "root"
  failed_when: false

- name: "Find world-writable files in critical directories"
  when: "linux_file_permissions_find_world_writable | bool"
  ansible.builtin.shell: >
    find /etc /usr /bin /sbin -xdev -perm -0002 -type f 2>/dev/null
  changed_when: false
  register: "world_writable_files"
  failed_when: false

- name: "Fail if world-writable files found in critical paths"
  when:
    - "linux_file_permissions_find_world_writable | bool"
    - "linux_file_permissions_fail_on_world_writable | bool"
    - "world_writable_files.stdout_lines | length > 0"
  ansible.builtin.fail:
    msg: >
      World-writable files found in critical directories:
      {{ world_writable_files.stdout_lines }}
      Review and remove write permissions: chmod o-w <file>

- name: "Find unowned files"
  when: "linux_file_permissions_find_unowned | bool"
  ansible.builtin.shell: >
    find / -xdev -nouser -o -nogroup 2>/dev/null | head -20
  changed_when: false
  register: "unowned_files"
  failed_when: false

- name: "Debug file permissions status (verbosity >=1)"
  when: "ansible_verbosity >= 1"
  ansible.builtin.debug:
    msg:
      - "Auth files updated: {{ auth_files_result.results | selectattr('changed') | list | length }}"
      - "System files updated: {{ system_files_result.results | selectattr('changed') | list | length }}"
      - "World-writable files: {{ world_writable_files.stdout_lines | default([]) }}"
      - "Unowned files sample: {{ unowned_files.stdout_lines | default([]) }}"

...

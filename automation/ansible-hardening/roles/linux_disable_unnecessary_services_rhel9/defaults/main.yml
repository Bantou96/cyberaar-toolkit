---

# Main toggle
linux_disable_unnecessary_services_enabled: true

# Services to mask/disable (even if installed)
linux_services_to_mask:
  - "avahi-daemon"           # CIS 2.2.4  — mDNS – unnecessary on servers, potential info leak
  - "cups"                   # CIS 2.2.16 — printing – almost never needed on servers
  - "cups-browsed"
  - "bluetooth"
  - "ModemManager"           # mobile broadband – server irrelevant
  - "nfs-server"             # CIS 2.2.12 — if no NFS exports
  - "rpcbind"                # CIS 2.2.13 — if no NFS/RPC
  - "postfix"                # CIS 2.2.18 — mail transfer – disable unless relay needed
  - "autofs"                 # CIS 1.1.22 — automounting – physical attack vector
  - "xinetd"                 # CIS 2.1.1  — legacy super-daemon – replaced by systemd sockets
  - "rsyncd"                 # CIS 2.2.3  — unencrypted file sync – use sftp/scp instead
  - "snmpd"                  # CIS 2.2.5  — SNMP v1/v2 transmit data in clear
  - "squid"                  # CIS 2.2.6  — HTTP proxy – remove if not required
  - "smb"                    # CIS 2.2.7  — Samba – Windows file sharing, disable on pure Linux
  - "dovecot"                # CIS 2.2.8  — IMAP/POP3 – remove unless mail server
  - "httpd"                  # CIS 2.2.9  — Apache web server – remove unless required
  - "vsftpd"                 # CIS 2.2.10 — FTP – insecure, use SFTP instead
  - "named"                  # CIS 2.2.11 — DNS server – remove unless designated DNS
  - "slapd"                  # CIS 2.2.14 — LDAP server – remove unless directory server
  - "dhcpd"                  # CIS 2.2.15 — DHCP server – remove unless designated DHCP
  - "ypserv"                 # CIS 2.2.17 — NIS server – insecure legacy protocol

# Services to stop/disable but NOT mask (if they might be needed occasionally)
linux_services_to_disable:
  - "NetworkManager-wait-online"  # desktop-oriented
  - "atd"                    # at jobs – rarely used
  - "lpd"                    # legacy printing
  - "rhnsd"                  # CIS 1.2.2  — Red Hat Network polling daemon

# Packages to remove (optional – set to false if you prefer just disable/mask)
linux_packages_to_remove:
  enabled: false
  list:
    - "avahi"
    - "cups"
    - "cups-client"
    - "cups-libs"
    - "ModemManager"
    - "bluetooth"
    - "xinetd"
    - "rsync"                # remove rsyncd server package if not needed
    - "net-snmp"             # CIS 2.2.5
    - "squid"                # CIS 2.2.6
    - "samba"                # CIS 2.2.7
    - "dovecot"              # CIS 2.2.8
    - "httpd"                # CIS 2.2.9
    - "vsftpd"               # CIS 2.2.10
    - "bind"                 # CIS 2.2.11
    - "openldap-servers"     # CIS 2.2.14
    - "dhcp-server"          # CIS 2.2.15
    - "ypserv"               # CIS 2.2.17
    - "ypbind"               # CIS 2.3.1  — NIS client
    - "rsh"                  # CIS 2.3.2  — legacy remote shell client
    - "talk"                 # CIS 2.3.3  — legacy messaging
    - "telnet"               # CIS 2.3.4  — insecure remote access
    - "openldap-clients"     # CIS 2.3.5  — LDAP client

# Keep these even if in lists above (overrides)
linux_services_exceptions:
  - "chronyd"                # keep NTP if you use it instead of timesyncd
  - "sshd"                   # obviously

# Role global disable
linux_unnecessary_services_disabled: false

...

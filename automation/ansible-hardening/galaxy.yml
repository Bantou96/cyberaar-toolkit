description: >
  CIS-aligned hardening roles for RHEL 9 family (AlmaLinux 9, Rocky Linux 9)
  and Ubuntu/Debian servers. Implements 47 roles (23 RHEL9, 24 Ubuntu/Debian)
  covering SSH, sudo, cron, wireless, kernel hardening, auditing, MAC enforcement
  (SELinux/AppArmor), firewall, AIDE, and more — with a three-step baseline →
  harden → baseline pipeline.


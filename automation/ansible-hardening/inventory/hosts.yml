# =============================================================================
#  CyberAar — Ansible Inventory Template
#  Adapt to your environment. Use SSH keys or Ansible Vault for credentials.
#
#  ansible-vault encrypt_string 'your_password' --name 'ansible_become_pass'
# =============================================================================

# ── RHEL9 / AlmaLinux / Rocky Linux servers ───────────────────────────────
[rhel_servers]
# srv-dakar-01    ansible_host=10.0.1.10
# srv-dakar-02    ansible_host=10.0.1.11
# srv-thies-01    ansible_host=10.0.2.10

[rhel_servers:vars]
ansible_user=admin
ansible_become=true
ansible_become_method=sudo
# ansible_python_interpreter=/usr/bin/python3
# ansible_become_pass: !vault |  # use ansible-vault

# ── Ubuntu / Debian servers ───────────────────────────────────────────────
[ubuntu_servers]
# srv-ubuntu-01   ansible_host=10.0.4.10
# srv-ubuntu-02   ansible_host=10.0.4.11
# srv-debian-01   ansible_host=10.0.5.10

[ubuntu_servers:vars]
ansible_user=admin
ansible_become=true
ansible_become_method=sudo
# ansible_python_interpreter=/usr/bin/python3

# ── DMZ / Exposed servers (stricter score threshold) ─────────────────────
[dmz_servers]
# srv-dmz-web01   ansible_host=10.0.3.10

[dmz_servers:vars]
ansible_user=admin
ansible_become=true
cyberaar_score_threshold: 30   # block hardening if score < 30%

# ── All servers combined ──────────────────────────────────────────────────
[linux_servers:children]
rhel_servers
ubuntu_servers

[all:vars]
# ── CyberAar baseline settings ───────────────────────────────
cyberaar_mail_enabled=false
cyberaar_mail_to=soc@example.sn
cyberaar_local_report_dir=../../../examples/baseline-reports
cyberaar_cron_enabled=true
cyberaar_cron_weekday=0
cyberaar_cron_hour=3
cyberaar_cron_minute=0

# ── GRUB bootloader password (required by linux_bootloader_password_*)
# Set via environment variable or vault — NEVER plaintext:
# export LINUX_BOOTLOADER_PASSWORD="YourStrongGrubPassword"
# Or in vault: ansible_bootloader_password: !vault | <encrypted>

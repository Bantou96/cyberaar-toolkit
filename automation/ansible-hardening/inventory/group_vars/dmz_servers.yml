---
# =============================================================================
#  group_vars/dmz_servers.yml
#  Variables applied to every host in [dmz_servers].
#  DMZ hosts are internet-exposed — stricter score threshold enforced.
# =============================================================================

# ── Network addressing ────────────────────────────────────────────────────────
linux_network_provisioning_prefix: "10.0.3"
linux_network_provisioning_address: "{{ linux_network_provisioning_prefix }}.{{ index }}"

linux_network_management_prefix: "10.0.6"
linux_network_management_address: "{{ linux_network_management_prefix }}.{{ index }}"
linux_network_management_gateway: "10.0.6.1"

ansible_host: "{{ linux_network_provisioning_address }}"

# ── Default NIC name ──────────────────────────────────────────────────────────
linux_network_interface_name: "eth0"

# ── Stricter CyberAar score threshold for DMZ ────────────────────────────────
# Hardening is blocked if the pre-hardening baseline score is below this value.
cyberaar_score_threshold: 30

# ── Stricter hardening overrides for DMZ hosts ───────────────────────────────
linux_selinux_mode: "enforcing"
linux_secure_boot_enforce: true
linux_firewalld_default_zone: "drop"

---

# To switch to the cyberaar namespace once approved on Galaxy:
#   1. Change namespace: bantou96  →  namespace: cyberaar
#   2. Update the Galaxy badge in README.md (bantou96.hardening → cyberaar.hardening)
#   3. Run: ansible-galaxy collection publish with the new tarball
namespace: bantou96
name: hardening
version: 1.9.0
readme: README.md

authors:
  - CyberAar team

description: >
  CIS-aligned hardening roles for RHEL 9 family (AlmaLinux 9, Rocky Linux 9)
  and Ubuntu/Debian servers. Implements 51 roles (25 RHEL9, 26 Ubuntu/Debian)
  covering SSH, sudo, cron, wireless, IPv6 hardening, journald, kernel hardening,
  auditing, MAC enforcement (SELinux/AppArmor), firewall, AIDE, and more — with
  a three-step baseline → harden → baseline pipeline.

license:
  - GPL-3.0-or-later

tags:
  - security
  - hardening
  - cis
  - rhel9
  - almalinux
  - rocky
  - ubuntu
  - debian
  - selinux
  - apparmor
  - firewalld
  - ufw
  - auditd
  - fail2ban
  - sudo
  - cron
  - wireless
  - ipv6
  - journald

repository: https://github.com/cyberaar/cyberaar-toolkit
documentation: https://github.com/cyberaar/cyberaar-toolkit/tree/main/ansible-hardening/docs
homepage: https://www.linkedin.com/company/cyberaar/
issues: https://github.com/cyberaar/cyberaar-toolkit/issues

build_ignore:
  - .gitignore
  - tests/
  - molecule/
  - .github/

...

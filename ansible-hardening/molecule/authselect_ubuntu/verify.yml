---
- name: "Verify — authselect Ubuntu"
  hosts: ubuntu
  gather_facts: false
  become: true

  tasks:
    # ── pwquality.conf ─────────────────────────────────────────────────────────
    - name: "Stat /etc/security/pwquality.conf"
      ansible.builtin.stat:
        path: /etc/security/pwquality.conf
      register: pwquality_stat

    - name: "Assert /etc/security/pwquality.conf exists"
      ansible.builtin.assert:
        that: pwquality_stat.stat.exists
        fail_msg: "/etc/security/pwquality.conf was not deployed"

    - name: "Retrieve effective (non-commented) pwquality settings"
      ansible.builtin.command: grep -E '^[^#]' /etc/security/pwquality.conf
      changed_when: false
      failed_when: false
      register: pwquality_effective

    - name: "Assert minlen is configured in pwquality.conf"
      ansible.builtin.assert:
        that: "'minlen' in pwquality_effective.stdout"
        fail_msg: "minlen not found in effective pwquality.conf settings"

    - name: "Assert minlen >= 14"
      ansible.builtin.assert:
        that: >
          (pwquality_effective.stdout |
           regex_search('minlen = (\d+)') |
           default('minlen = 0') |
           split(' ') | last | int) >= 14
        fail_msg: "pwquality minlen is not set to >= 14"

    # ── /etc/pam.d/common-password ─────────────────────────────────────────────
    - name: "Stat /etc/pam.d/common-password"
      ansible.builtin.stat:
        path: /etc/pam.d/common-password
      register: common_password_stat

    - name: "Assert /etc/pam.d/common-password exists"
      ansible.builtin.assert:
        that: common_password_stat.stat.exists
        fail_msg: "/etc/pam.d/common-password does not exist"

    - name: "Check common-password contains pam_pwquality.so"
      ansible.builtin.command: grep -q pam_pwquality /etc/pam.d/common-password
      changed_when: false
      failed_when: false
      register: pam_pwquality_check

    - name: "Assert pam_pwquality.so is in common-password"
      ansible.builtin.assert:
        that: pam_pwquality_check.rc == 0
        fail_msg: "pam_pwquality.so not found in /etc/pam.d/common-password"

    # ── /etc/pam.d/common-auth ─────────────────────────────────────────────────
    - name: "Stat /etc/pam.d/common-auth"
      ansible.builtin.stat:
        path: /etc/pam.d/common-auth
      register: common_auth_stat

    - name: "Assert /etc/pam.d/common-auth exists"
      ansible.builtin.assert:
        that: common_auth_stat.stat.exists
        fail_msg: "/etc/pam.d/common-auth does not exist"

    - name: "Check common-auth contains pam_faillock.so or pam_unix.so"
      ansible.builtin.command: grep -qE 'pam_faillock|pam_unix' /etc/pam.d/common-auth
      changed_when: false
      failed_when: false
      register: pam_auth_check

    - name: "Assert pam_faillock.so or pam_unix.so is in common-auth"
      ansible.builtin.assert:
        that: pam_auth_check.rc == 0
        fail_msg: "Neither pam_faillock.so nor pam_unix.so found in /etc/pam.d/common-auth"

    # ── /etc/security/faillock.conf ────────────────────────────────────────────
    - name: "Stat /etc/security/faillock.conf"
      ansible.builtin.stat:
        path: /etc/security/faillock.conf
      register: faillock_stat

    - name: "Assert /etc/security/faillock.conf exists"
      ansible.builtin.assert:
        that: faillock_stat.stat.exists
        fail_msg: "/etc/security/faillock.conf was not deployed"

    - name: "Retrieve effective (non-commented) faillock settings"
      ansible.builtin.command: grep -E '^[^#]' /etc/security/faillock.conf
      changed_when: false
      failed_when: false
      register: faillock_effective

    - name: "Assert deny is configured in faillock.conf"
      ansible.builtin.assert:
        that: "'deny' in faillock_effective.stdout"
        fail_msg: "deny not found in effective faillock.conf settings"

    # ── /etc/login.defs ────────────────────────────────────────────────────────
    - name: "Stat /etc/login.defs"
      ansible.builtin.stat:
        path: /etc/login.defs
      register: login_defs_stat

    - name: "Assert /etc/login.defs exists and is non-empty"
      ansible.builtin.assert:
        that:
          - login_defs_stat.stat.exists
          - login_defs_stat.stat.size > 0
        fail_msg: "/etc/login.defs does not exist or is empty"

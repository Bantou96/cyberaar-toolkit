---
- name: "Converge — IPv6 hardening"
  hosts: all
  gather_facts: true
  tasks:
    - name: "Apply linux_ipv6_rhel9"
      when: ansible_os_family == "RedHat"
      ansible.builtin.include_role:
        name: "linux_ipv6_rhel9"

    - name: "Apply linux_ipv6_ubuntu"
      when: ansible_os_family == "Debian"
      ansible.builtin.include_role:
        name: "linux_ipv6_ubuntu"
      vars:
        linux_ipv6_update_initramfs: false

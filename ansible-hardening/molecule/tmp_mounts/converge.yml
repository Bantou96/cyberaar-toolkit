---
- name: "Converge — tmp_mounts RHEL9"
  hosts: rhel9
  become: false

  vars:
    # Skip /home nodev in containers — /home is not a separate partition
    linux_home_nodev_enabled: false

  roles:
    - role: linux_tmp_mounts_rhel9

- name: "Converge — tmp_mounts Ubuntu"
  hosts: ubuntu
  become: true

  roles:
    - role: linux_tmp_mounts_ubuntu

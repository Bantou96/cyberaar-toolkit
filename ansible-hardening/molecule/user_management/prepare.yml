---
- name: "Prepare — user_management RHEL9"
  hosts: rhel9
  gather_facts: false
  become: false

  tasks:
    - name: "Update dnf cache"
      ansible.builtin.raw: dnf makecache -q
      changed_when: false

    - name: "Install openssh-server (needed for sshd_config validate)"
      ansible.builtin.raw: dnf install -y openssh-server
      changed_when: false

    - name: "Generate SSH host keys"
      ansible.builtin.raw: ssh-keygen -A
      changed_when: false

- name: "Prepare — user_management Ubuntu"
  hosts: ubuntu
  gather_facts: false
  become: true

  tasks:
    - name: "Update apt cache"
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

---

# =============================================================================
#  group_vars/ubuntu_servers.yml
#  Variables applied to every host in [ubuntu_servers].
# =============================================================================

# ── Network addressing ────────────────────────────────────────────────────────
linux_network_provisioning_address: "192.168.2.{{ index }}"
linux_network_management_address: "192.168.2.{{ index }}"
linux_network_management_gateway: "192.168.2.1"

ansible_host: "{{ linux_network_provisioning_address }}"

# ── Default NIC name ──────────────────────────────────────────────────────────

# ── CyberAar score threshold ──────────────────────────────────────────────────
cyberaar_score_threshold: 20

...

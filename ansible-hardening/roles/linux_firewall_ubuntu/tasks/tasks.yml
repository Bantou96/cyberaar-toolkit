---
# ── WSL / systemd detection ───────────────────────────────────────────────────
- name: "Detect WSL environment"
  ansible.builtin.stat:
    path: "/proc/sys/fs/binfmt_misc/WSLInterop"
  register: "_wsl_interop"

- name: "Check if systemd is the init process (PID 1)"
  ansible.builtin.command: "ps -p 1 -o comm="
  changed_when: false
  register: "_pid1"
  failed_when: false

- name: "Set WSL / no-systemd fact"
  ansible.builtin.set_fact:
    _skip_service_mgmt: >-
      {{ _wsl_interop.stat.exists and (_pid1.stdout | trim) != 'systemd' }}

# ── Package install ───────────────────────────────────────────────────────────
- name: "Ensure ufw package is installed"
  ansible.builtin.package:
    name: "ufw"
    state: "present"

- name: "Verify ufw binary is available"
  ansible.builtin.command: "which ufw"
  changed_when: false
  register: "_ufw_bin"
  failed_when: "_ufw_bin.rc != 0"

# ── UFW rules ─────────────────────────────────────────────────────────────────
- name: "Set UFW default incoming policy to deny"
  community.general.ufw:
    direction: "incoming"
    policy: "deny"

- name: "Set UFW default outgoing policy to allow"
  community.general.ufw:
    direction: "outgoing"
    policy: "allow"

- name: "Set UFW default forward policy to deny"
  community.general.ufw:
    direction: "routed"
    policy: "deny"

- name: "Allow SSH through UFW before enabling (prevent lockout)"
  community.general.ufw:
    rule: "allow"
    port: "{{ linux_firewall_ssh_port }}"
    proto: "tcp"
    comment: "CyberAar: SSH access"

- name: "Apply custom UFW allow rules"
  when: "linux_firewall_allow_rules | length > 0"
  community.general.ufw:
    rule: "allow"
    port: "{{ item.port }}"
    proto: "{{ item.proto | default('tcp') }}"
    src: "{{ item.src | default('any') }}"
    comment: "{{ item.comment | default('CyberAar custom rule') }}"
  loop: "{{ linux_firewall_allow_rules }}"

- name: "Apply custom UFW deny rules"
  when: "linux_firewall_deny_rules | length > 0"
  community.general.ufw:
    rule: "deny"
    port: "{{ item.port }}"
    proto: "{{ item.proto | default('tcp') }}"
    comment: "{{ item.comment | default('CyberAar deny rule') }}"
  loop: "{{ linux_firewall_deny_rules }}"

- name: "Enable UFW and set to start on boot"
  community.general.ufw:
    state: "enabled"

# ── Service management (skipped on WSL without systemd) ───────────────────────
- name: "Enable UFW service"
  when: "not _skip_service_mgmt"
  ansible.builtin.service:
    name: "ufw"
    state: "started"
    enabled: true

- name: "Note: UFW service management skipped (WSL without systemd)"
  when: "_skip_service_mgmt"
  ansible.builtin.debug:
    msg: >
      WSL without systemd detected — UFW rules applied but service
      enable/start skipped. UFW state is active for this session.

# ── Sysctl hardening ──────────────────────────────────────────────────────────
- name: "Deploy UFW sysctl hardening"
  ansible.builtin.template:
    src: "ufw-sysctl.conf.j2"
    dest: "/etc/ufw/sysctl.conf"
    mode: "0644"
    owner: "root"
    group: "root"
    backup: true
  register: "ufw_sysctl_result"
  notify: "Reload ufw"

# ── Debug ─────────────────────────────────────────────────────────────────────
- name: "Show UFW status (verbosity >=1)"
  when: "ansible_verbosity >= 1"
  ansible.builtin.command: "ufw status verbose"
  changed_when: false
  register: "ufw_status"

- name: "Debug UFW status (verbosity >=1)"
  when: "ansible_verbosity >= 1"
  ansible.builtin.debug:
    msg: "{{ ufw_status.stdout_lines }}"

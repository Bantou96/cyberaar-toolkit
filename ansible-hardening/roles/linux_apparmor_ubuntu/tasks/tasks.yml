---
# ── GRUB / WSL detection ───────────────────────────────────────────────────────
# WSL does not use GRUB. Containers and some cloud VMs also have no GRUB.
# Guard all GRUB tasks on both WSL detection AND actual file existence so the
# role is safe on any Ubuntu system regardless of bootloader.
- name: "Detect WSL environment"
  ansible.builtin.stat:
    path: "/proc/sys/fs/binfmt_misc/WSLInterop"
  register: "_wsl_interop"

- name: "Check GRUB config file exists"
  ansible.builtin.stat:
    path: "/etc/default/grub"
  register: "_grub_config"

- name: "Set WSL fact"
  ansible.builtin.set_fact:
    _is_wsl: "{{ _wsl_interop.stat.exists }}"
    _has_grub: "{{ _grub_config.stat.exists }}"

# ── AppArmor packages ─────────────────────────────────────────────────────────
- name: "Ensure AppArmor packages are installed"
  ansible.builtin.package:
    name:
      - "apparmor"
      - "apparmor-utils"
      - "apparmor-profiles"
      - "apparmor-profiles-extra"
    state: "present"

# ── GRUB cmdline (skipped on WSL — no bootloader present) ────────────────────
- name: "Ensure AppArmor is enabled in GRUB cmdline"
  when:
    - "not _is_wsl"
    - "_has_grub"
  ansible.builtin.lineinfile:
    path: "/etc/default/grub"
    regexp: '^(GRUB_CMDLINE_LINUX_DEFAULT=")(.*)"$'
    line: '\g<1>\2 apparmor=1 security=apparmor"'
    backrefs: true
  register: "grub_apparmor_result"

- name: "Rebuild GRUB config if AppArmor cmdline changed"
  when:
    - "not _is_wsl"
    - "_has_grub"
    - "grub_apparmor_result.changed"
  ansible.builtin.command: "update-grub"
  changed_when: true

- name: "Note: GRUB cmdline skipped on WSL or when no GRUB config present"
  when: "_is_wsl or not _has_grub"
  ansible.builtin.debug:
    msg: "No GRUB config or WSL detected — skipping GRUB cmdline update. AppArmor must be enabled in the kernel/bootloader externally."

# ── AppArmor service ──────────────────────────────────────────────────────────
- name: "Enable AppArmor service at boot"
  ansible.builtin.systemd:
    name: "apparmor"
    enabled: true
    daemon_reload: false

- name: "Start AppArmor service (best-effort — oneshot service loads profiles)"
  when: "not ansible_check_mode"
  ansible.builtin.systemd:
    name: "apparmor"
    state: "started"
  changed_when: false
  failed_when: false

- name: "Collect currently loaded AppArmor profiles"
  when: "not ansible_check_mode"
  ansible.builtin.command: "apparmor_status --profiled"
  changed_when: false
  failed_when: false
  register: "aa_profiled"

- name: "Collect profiles in complain mode"
  when: "not ansible_check_mode"
  ansible.builtin.command: "apparmor_status --complaining"
  changed_when: false
  failed_when: false
  register: "aa_complaining"

- name: "Set all complain-mode profiles to enforce mode"
  when:
    - "linux_apparmor_enforce_all | bool"
    - "not ansible_check_mode"
    - "(aa_complaining.stdout | default('0') | int) > 0"
  ansible.builtin.command: "aa-enforce /etc/apparmor.d/*"
  changed_when: "'Setting' in (aa_enforce_result.stdout | default(''))"
  failed_when: false
  register: "aa_enforce_result"

- name: "Set specific profiles to enforce mode"
  when:
    - "not linux_apparmor_enforce_all | bool"
    - "linux_apparmor_enforce_profiles | length > 0"
    - "not ansible_check_mode"
  ansible.builtin.command: "aa-enforce {{ item }}"
  loop: "{{ linux_apparmor_enforce_profiles }}"
  register: "aa_enforce_profiles_result"
  changed_when: "'Setting' in (aa_enforce_profiles_result.stdout | default(''))"
  failed_when: false

- name: "Deploy AppArmor local overrides if defined"
  when: "linux_apparmor_local_overrides | length > 0"
  ansible.builtin.template:
    src: "apparmor-local-override.j2"
    dest: "/etc/apparmor.d/local/{{ item.profile }}"
    mode: "0644"
    owner: "root"
    group: "root"
  loop: "{{ linux_apparmor_local_overrides }}"
  register: "aa_override_result"
  notify: "Reload AppArmor profiles"

- name: "Debug AppArmor status (verbosity >=1)"
  when: "ansible_verbosity >= 1"
  ansible.builtin.debug:
    msg:
      - "WSL environment: {{ _is_wsl }}"
      - "Profiles loaded: {{ aa_profiled.stdout | default('unknown') }}"
      - "Profiles in complain mode: {{ aa_complaining.stdout | default('0') }}"
      - "Enforce-all triggered: {{ aa_enforce_result.changed | default(false) }}"
